<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gap King Pro</title>
    <style>
        :root { --bg: #f0f2f7; --card: #ffffff; --text: #0f1120; --blue: #2563eb; --red: #e8203a; --green: #00a85a; --border: #dde1ec; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .game-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin: 8px 0; font-size: 14px; }
        .val { font-family: monospace; font-weight: bold; font-size: 16px; }
        .signal { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-weight: 800; text-transform: uppercase; }
        .idle { background: #eee; color: #666; }
        .buy { background: var(--red); color: white; animation: blink 1s infinite; }
        .sell { background: var(--green); color: white; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        .profit-box { background: #f8fafc; border-radius: 8px; padding: 10px; margin-top: 10px; border: 1px dashed var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <h1>Gap King Pro</h1>
        <div id="clock" style="font-family: monospace;">POLLING LIVE...</div>
    </div>

    <div id="main-grid" class="grid">
        </div>

<script>
    const STAKE = 5.00;
    const GAP_THRESHOLD = 8.0;
    const ODDS_API_KEY = '75fbd1947a7dec109b7573b6951a65aa';
    const PROXY = "https://corsproxy.io/?url=";

    function oddsToProb(odds) {
        if (odds < 0) return (Math.abs(odds) / (Math.abs(odds) + 100)) * 100;
        return (100 / (odds + 100)) * 100;
    }

    function calculateTrade(stake, buyOdds, truthProb) {
        const buyProb = oddsToProb(buyOdds);
        let potentialProfit = (buyOdds < 0) ? (stake / (Math.abs(buyOdds) / 100)) : (stake * (buyOdds / 100));
        const gross = stake + potentialProfit;
        const edgeValue = (truthProb - buyProb) / 100;
        const predictedNet = gross * edgeValue;
        return { gross, predictedNet };
    }

    async function updateDashboard() {
        const grid = document.getElementById('main-grid');
        
        // 1. Get Schedule & Live Probabilities
        const mlbRes = await fetch(PROXY + encodeURIComponent("https://statsapi.mlb.com/api/v1/schedule?sportId=1&hydrate=liveLookin"));
        const mlbData = await mlbRes.json();
        const games = mlbData.dates[0]?.games || [];

        // 2. Get Market Odds
        const oddsRes = await fetch(PROXY + encodeURIComponent(`https://api.the-odds-api.com/v4/sports/baseball_mlb/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=h2h`));
        const oddsData = await oddsRes.json();

        grid.innerHTML = "";

        games.forEach(game => {
            const homeTeam = game.teams.home.team.name;
            const awayTeam = game.teams.away.team.name;
            const truthProb = game.teams.home.homeWinProbability || 50.0;
            
            // Find Matching Odds
            const marketGame = oddsData.find(g => g.home_team.includes(homeTeam) || homeTeam.includes(g.home_team));
            const book = marketGame?.bookmakers.find(b => b.key === 'hardrock') || marketGame?.bookmakers[0];
            const marketOdds = book?.markets[0].outcomes.find(o => o.name === marketGame.home_team)?.price || 1.91; // Decimal default
            
            // Convert Decimal to American for calculation if needed, but oddsToProb handles decimal in a way, 
            // lets simplify: the API returns decimals.
            const marketProb = (1 / marketOdds) * 100;
            const gap = truthProb - marketProb;
            const { gross, predictedNet } = calculateTrade(STAKE, (marketOdds > 2 ? (marketOdds-1)*100 : -100/(marketOdds-1)), truthProb);

            const card = document.createElement('div');
            card.className = 'card';
            
            let signalClass = 'idle';
            let signalText = 'Monitoring';
            if (gap >= GAP_THRESHOLD) {
                signalClass = 'buy';
                signalText = `🚨 BUY SIGNAL: Bet ${homeTeam}`;
            } else if (gap < 1.0 && truthProb > 80.0) {
                signalClass = 'sell';
                signalText = `✅ SELL SIGNAL: Cash Out`;
            }

            card.innerHTML = `
                <div class="game-title">${awayTeam} @ ${homeTeam}</div>
                <div class="stat-row"><span>MLB GUMBO (TRUTH)</span><span class="val">${truthProb.toFixed(1)}%</span></div>
                <div class="stat-row"><span>MARKET (HARD ROCK)</span><span class="val">${marketProb.toFixed(1)}%</span></div>
                <div class="stat-row"><span>CURRENT GAP</span><span class="val" style="color:${gap > 0 ? 'var(--green)' : 'var(--red)'}">${gap.toFixed(1)}%</span></div>
                
                <div class="profit-box">
                    <div class="stat-row"><span>STAKE</span><span class="val">$${STAKE.toFixed(2)}</span></div>
                    <div class="stat-row"><span>PREDICTED NET</span><span class="val" style="color:var(--green)">+$${predictedNet.toFixed(2)}</span></div>
                </div>

                <div class="signal ${signalClass}">${signalText}</div>
            `;
            grid.appendChild(card);
        });
    }

    // Refresh every 10 seconds to stay under API limits but keep speed
    setInterval(updateDashboard, 10000);
    updateDashboard();
</script>
</body>
</html>
