<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gap King - Live MLB Arb</title>
    <style>
        /* Simplified styles for mobile-first performance */
        :root { --bg: #f0f2f7; --surface: #fff; --text: #0f1120; --green: #00a85a; --red: #e8203a; --blue: #2563eb; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .card { background: var(--surface); border-radius: 12px; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .live-pulse { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: var(--blue); color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; }
        #log { font-size: 12px; color: #666; height: 100px; overflow-y: auto; background: #eee; padding: 5px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>👑 Gap King</h2>
        <p>Status: <span id="status">Connecting...</span></p>
    </div>

    <div id="game-list" class="grid">
        </div>

    <div class="card" id="active-watch" style="display:none;">
        <h3 id="game-title">Select a Game</h3>
        <div style="font-size: 24px; font-weight: bold; color: var(--blue);">
            MLB Win%: <span id="mlb-wp">--</span>
        </div>
        <div style="font-size: 18px;">
            Book Implied: <span id="book-wp">--</span>
        </div>
        <hr>
        <div id="signal" style="padding: 10px; text-align: center; font-weight: bold; border-radius: 8px;">
            MONITORING...
        </div>
    </div>

    <div id="log"></div>

<script>
    const ODDS_API_KEY = '75fbd1947a7dec109b7573b6951a65aa';
    const PROXY = "https://corsproxy.io/?url=";

    async function fetchData(url) {
        const response = await fetch(PROXY + encodeURIComponent(url));
        return await response.json();
    }

    async function loadSchedule() {
        const log = document.getElementById('log');
        log.innerHTML += "Fetching MLB Games...<br>";
        try {
            const data = await fetchData("https://statsapi.mlb.com/api/v1/schedule?sportId=1");
            const games = data.dates[0].games;
            const container = document.getElementById('game-list');
            container.innerHTML = "";

            games.forEach(game => {
                const div = document.createElement('div');
                div.className = "card";
                div.innerHTML = `
                    <strong>${game.teams.away.team.name} @ ${game.teams.home.team.name}</strong><br>
                    <button class="btn" onclick="startWatch(${game.gamePk}, '${game.teams.home.team.name}')">Watch Gap</button>
                `;
                container.appendChild(div);
            });
            document.getElementById('status').innerText = "Ready";
        } catch (e) {
            log.innerHTML += "Error: " + e.message + "<br>";
        }
    }

    async function startWatch(gamePk, homeTeamName) {
        document.getElementById('active-watch').style.display = "block";
        document.getElementById('game-title').innerText = "Tracking: " + homeTeamName;
        
        // Polling interval
        setInterval(async () => {
            // 1. Get Live MLB Win Prob
            const mlbData = await fetchData(`https://statsapi.mlb.com/api/v1.1/game/${gamePk}/feed/live`);
            const wp = mlbData.liveData?.plays?.currentPlay?.about?.homeWinProbability || 50;
            document.getElementById('mlb-wp').innerText = wp + "%";

            // 2. Get Live Odds (Simplified for example)
            // Note: In a real scenario, you'd filter the Odds API response for the specific game
            document.getElementById('book-wp').innerText = "Loading Odds...";
            
            checkGap(wp, 50); // Replace 50 with real implied probability from Odds API logic
        }, 10000);
    }

    function checkGap(mlb, book) {
        const gap = mlb - book;
        const sig = document.getElementById('signal');
        if (gap > 8) {
            sig.innerText = "🔥 BUY SIGNAL: EDGE " + gap.toFixed(1) + "%";
            sig.style.background = "var(--red)";
            sig.style.color = "white";
        } else {
            sig.innerText = "NO EDGE (" + gap.toFixed(1) + "%)";
            sig.style.background = "#eee";
            sig.style.color = "#666";
        }
    }

    loadSchedule();
</script>
</body>
</html>
